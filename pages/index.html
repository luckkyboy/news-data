<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日简报预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h1>预览</h1>
          <p id="current-date-label"></p>
        </div>
        <nav id="date-list" class="date-list" aria-label="日期列表"></nav>
      </aside>
      <section class="preview-pane">
        <div class="preview-toolbar">
          <button id="prev-button" type="button">上一天</button>
          <button id="next-button" type="button">下一天</button>
        </div>
        <div class="image-shell">
          <img id="preview-image" alt="预览图片" />
        </div>
      </section>
      <section class="json-pane">
        <h2>JSON</h2>
        <pre id="json-panel"></pre>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
  </html>
