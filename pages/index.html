<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日简报-每日新闻</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="cool">
    <main class="split-shell">
      <section class="preview-pane">
        <div class="preview-frame">
          <div class="preview-topbar">
            <div class="preview-toolbar">
              <button id="prev-button" type="button">上一天</button>
              <button id="next-button" type="button">下一天</button>
              <a id="open-image-link" href="#" target="_blank" rel="noreferrer">原图</a>
              <a id="open-json-link" href="#" target="_blank" rel="noreferrer">原始 JSON</a>
            </div>
          </div>

          <div class="preview-canvas">
            <div class="preview-stage-shell">
              <div class="preview-stage">
              <div class="preview-image-shell">
                <img id="preview-image" alt="预览图片" />
              </div>

              <section class="raw-json-panel">
                <pre id="json-panel"></pre>
              </section>
            </div>
          </div>
          </div>

        </div>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
