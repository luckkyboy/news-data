<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日简报预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="gallery-shell">
      <section class="gallery-stage">
        <header class="stage-header">
          <div class="stage-kicker">
            <p class="eyebrow">Gallery Console</p>
            <h1 id="stage-date-label">-</h1>
          </div>
          <div class="stage-actions">
            <button id="prev-button" type="button">上一天</button>
            <button id="next-button" type="button">下一天</button>
            <a id="open-image-link" href="#" target="_blank" rel="noreferrer">原图</a>
            <a id="open-json-link" href="#" target="_blank" rel="noreferrer">原始 JSON</a>
          </div>
        </header>

        <div class="stage-frame">
          <div class="stage-badge" aria-hidden="true">NEWS DATA</div>
          <div class="stage-media">
            <img id="preview-image" alt="预览图片" />
          </div>
        </div>
      </section>

      <aside class="gallery-info">
        <section id="summary-panel" class="summary-panel"></section>
        <details class="raw-json-block" open>
          <summary>原始 JSON</summary>
          <pre id="json-panel"></pre>
        </details>
      </aside>

      <aside class="timeline">
        <div class="timeline-head">
          <p class="eyebrow">Timeline</p>
          <p id="current-date-label" class="timeline-current"></p>
        </div>
        <nav id="date-list" class="date-list" aria-label="日期列表"></nav>
      </aside>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
  </html>
