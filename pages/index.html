<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日简报预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="cool">
    <main class="split-shell">
      <section class="preview-pane">
        <div class="preview-frame">
          <div class="preview-topbar">
            <div class="preview-badge-block">
              <p class="preview-badge">NEWS DATA</p>
              <h1 id="stage-date-label" class="preview-date">-</h1>
            </div>

            <div class="preview-toolbar">
              <button id="prev-button" type="button">上一天</button>
              <button id="next-button" type="button">下一天</button>
              <a id="open-image-link" href="#" target="_blank" rel="noreferrer">原图</a>
              <a id="open-json-link" href="#" target="_blank" rel="noreferrer">原始 JSON</a>
            </div>
          </div>

          <div class="preview-canvas">
            <img id="preview-image" alt="预览图片" />
          </div>
        </div>
      </section>

      <aside class="inspector-pane">
        <section class="raw-json-panel">
          <div class="raw-json-head">
            <p class="eyebrow">Raw Payload</p>
          </div>
          <pre id="json-panel"></pre>
        </section>
      </aside>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
