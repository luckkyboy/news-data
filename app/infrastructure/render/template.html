<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日简报</title>
    <style>
      __FONT_FACE__
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --card: #fffdf8;
        --text: #302822;
        --muted: #7f756b;
        --accent: #ef7d00;
        --line: rgba(48, 40, 34, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 0;
        background:
          radial-gradient(circle at top, rgba(239, 125, 0, 0.08), transparent 36%),
          linear-gradient(180deg, #fcfaf5 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "LXGW WenKai Mono", "PingFang SC", "Noto Sans CJK SC",
          "Noto Sans SC", "Source Han Sans SC", -apple-system,
          BlinkMacSystemFont, "Segoe UI", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }
      #news-card {
        width: 1200px;
        height: 1800px;
        display: grid;
        grid-template-rows: 180px 1fr 170px 150px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(48, 40, 34, 0.1);
      }
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 28px;
        padding: 26px 36px 24px;
        border-bottom: 1px solid var(--line);
        background: #f9f4eb;
      }
      .hero-main {
        min-width: 0;
        text-align: center;
        position: relative;
        top: 4px;
      }
      .brand {
        margin: 0;
        font-size: 74px;
        font-weight: 800;
        line-height: 1.1;
      }
      .brand-accent {
        color: var(--accent);
      }
      .hero-meta {
        margin-top: 14px;
        color: var(--muted);
        font-size: 31px;
        font-weight: 800;
      }
      .content {
        min-height: 0;
        padding: 32px 42px 18px;
      }
      ol {
        margin: 0;
        padding-left: 42px;
        font-size: 31px;
        line-height: 1.5;
        font-weight: 600;
      }
      li + li {
        margin-top: 14px;
      }
      .quote-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 42px;
        border-top: 1px solid var(--line);
        background: #f9f4eb;
        margin-top: 16px;
      }
      .quote-text {
        margin: 0;
        color: var(--muted);
        text-align: center;
        font-size: 31px;
        font-weight: 700;
        font-style: italic;
        line-height: 1.5;
      }
      .footer {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "left-top right-top"
          "left-bottom right-bottom";
        align-items: end;
        column-gap: 16px;
        row-gap: 4px;
        padding: 14px 36px 30px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 27px;
        font-weight: 400;
      }
      .footer-left,
      .footer-right {
        min-width: 0;
      }
      .footer-left {
        display: contents;
      }
      .footer-sources {
        grid-area: left-top;
        color: var(--text);
        font-size: 27px;
        font-weight: 400;
        line-height: 1.2;
      }
      .footer-meta {
        grid-area: left-bottom;
        display: inline-flex;
        flex-wrap: wrap;
        gap: 0;
      }
      .footer-right {
        display: contents;
      }
      .footer-right-top {
        grid-area: right-top;
        justify-self: end;
        color: var(--text);
        font-size: 27px;
        font-weight: 400;
        line-height: 1.2;
        text-align: right;
      }
      .footer-right-bottom {
        grid-area: right-bottom;
        justify-self: end;
        color: var(--muted);
        font-size: 27px;
        font-weight: 700;
        line-height: 1.2;
        text-align: right;
      }
      @media (max-width: 640px) {
        body {
          padding: 0;
        }
        .hero {
          padding: 22px 20px 18px;
          gap: 12px;
        }
        .content {
          padding: 20px 20px 16px;
        }
        .footer {
          padding: 12px 20px 16px;
          grid-template-columns: 1fr;
          grid-template-areas:
            "left-top"
            "left-bottom"
            "right-top"
            "right-bottom";
          gap: 8px;
        }
        .brand {
          font-size: 28px;
        }
        .hero-meta,
        .quote-text {
          font-size: 18px;
        }
        ol {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main id="news-card" aria-label="daily news card">
      <section class="hero">
        <div class="hero-main">
          <p class="brand">每日<span class="brand-accent">简报</span></p>
          <div id="hero-meta" class="hero-meta"></div>
        </div>
      </section>
      <section class="content">
        <ol id="news-list"></ol>
      </section>
      <section class="quote-zone">
        <p id="quote" class="quote-text" hidden></p>
      </section>
      <footer class="footer">
        <div class="footer-left">
          <span id="footer-sources" class="footer-sources" hidden></span>
          <div class="footer-meta">
            <span id="footer-count"></span>
            <span id="footer-updated"></span>
          </div>
        </div>
        <div class="footer-right">
          <span class="footer-right-top">使用霞鹜文楷渲染</span>
          <span class="footer-right-bottom">@Github luckkyboy/news-data</span>
        </div>
      </footer>
    </main>
    <script>
      window.__DATA__ = __NEWS_DATA__;
      const data = window.__DATA__ || {};
      const heroMeta = document.getElementById("hero-meta");
      const newsList = document.getElementById("news-list");
      const quote = document.getElementById("quote");
      const footerSources = document.getElementById("footer-sources");
      const footerCount = document.getElementById("footer-count");
      const footerUpdated = document.getElementById("footer-updated");

      function parseDateParts(value) {
        if (!value) return null;
        const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
        if (!match) return null;
        return {
          year: Number(match[1]),
          month: Number(match[2]),
          day: Number(match[3]),
        };
      }

      function formatChineseWeekday(value) {
        const parts = parseDateParts(value);
        if (!parts) return "";
        const labels = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const current = new Date(parts.year, parts.month - 1, parts.day);
        return labels[current.getDay()] || "";
      }

      function extractLunarText(title) {
        if (!title) return "";
        const match = title.match(/农历[^，,！!]+/);
        return match ? match[0].replace(/^农历/, "").trim() : "";
      }

      function ganzhiYear(year) {
        if (!year) return "";
        const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const offset = year - 1984; // 1984 = 甲子
        const stem = stems[((offset % 10) + 10) % 10];
        const branch = branches[((offset % 12) + 12) % 12];
        return `${stem}${branch}`;
      }

      function buildLunarDisplay(date, title) {
        const fromTitle = extractLunarText(title);
        if (!fromTitle) return "";
        if (/^[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]年/.test(fromTitle)) {
          return fromTitle;
        }
        const parts = parseDateParts(date);
        if (!parts) return fromTitle;
        return `${ganzhiYear(parts.year)}年${fromTitle}`;
      }

      function trimSeconds(value) {
        if (!value) return "";
        const match = value.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2})/);
        return match ? match[1] : value;
      }

      const dateParts = parseDateParts(data.date);
      const dateText = dateParts
        ? `${dateParts.year}年${dateParts.month}月${dateParts.day}日`
        : "";
      const weekdayText = formatChineseWeekday(data.date);
      const lunarText = buildLunarDisplay(data.date, data.title);
      heroMeta.textContent = [dateText, weekdayText, lunarText].filter(Boolean).join(" / ");

      (data.news || []).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        newsList.appendChild(li);
      });

      if (data.quote && data.quote.trim()) {
        quote.textContent = `『${data.quote.trim()}』`;
        quote.hidden = false;
      }

      if (Array.isArray(data.sources) && data.sources.length > 0) {
        footerSources.textContent = `${data.sources.join(" / ")}`;
        footerSources.hidden = false;
      }
      footerCount.textContent = `共 ${Array.isArray(data.news) ? data.news.length : 0} 条国内外精选新闻 `;
      footerUpdated.textContent = data.update_date ? `   更新于 ${trimSeconds(data.update_date)}` : "";
    </script>
  </body>
</html>
