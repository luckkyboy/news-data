<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}每日简报{% endblock %}</title>
    <style>
      {{ font_face_css | safe }}
      :root {
        color-scheme: light;
        --bg: #eef2f7;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --muted-strong: #1e293b;
        --accent: #0ea5e9;
        --line: #dbe4f0;
        --body-glow-1: rgba(14, 165, 233, 0.12);
        --body-glow-2: rgba(59, 130, 246, 0.1);
        --body-top: #f8fbff;
        --card-border: #d7e3f3;
        --card-shadow: rgba(15, 23, 42, 0.12);
        --hero-bg-1: #f8fcff;
        --hero-bg-2: #f2f7ff;
        --hero-bg-3: #eef4ff;
        --news-border: #dce8f8;
        --news-surface-top: #ffffff;
        --news-surface-bottom: #f8fbff;
        --badge-bg: #e0f2fe;
        --badge-text: #0369a1;
        --quote-bg-top: #f8fbff;
        --quote-bg-bottom: #f3f8ff;
        --quote-mark: #0f766e;
        --quote-text-color: #334155;
        --footer-bg: #f8fbff;
        --footer-accent-bar: #7dd3fc;
        --hero-meta-size: 27px;
        --hero-meta-weight: 800;
        --news-font-size: 30px;
        --news-item-gap: 8px;
        --footer-font-size: 24px;
        --footer-font-weight: 800;
        --footer-line-height: 1.25;
        --footer-edge-gap: 6px;
      }
      body[data-theme="warm"] {
        --bg: #f5f1e8;
        --card: #fffdf8;
        --text: #302822;
        --muted: #7f756b;
        --muted-strong: #62584e;
        --accent: #ef7d00;
        --line: rgba(48, 40, 34, 0.1);
        --body-glow-1: rgba(239, 125, 0, 0.08);
        --body-glow-2: rgba(239, 125, 0, 0);
        --body-top: #fcfaf5;
        --card-border: rgba(48, 40, 34, 0.1);
        --card-shadow: rgba(48, 40, 34, 0.1);
        --hero-bg-1: #f9f4eb;
        --hero-bg-2: #f9f4eb;
        --hero-bg-3: #f9f4eb;
        --news-border: rgba(48, 40, 34, 0.12);
        --news-surface-top: #fffdf8;
        --news-surface-bottom: #fbf6ee;
        --badge-bg: #ffe7cc;
        --badge-text: #b45309;
        --quote-bg-top: #f9f4eb;
        --quote-bg-bottom: #f9f4eb;
        --quote-mark: #b45309;
        --quote-text-color: #62584e;
        --footer-bg: #fffaf2;
        --footer-accent-bar: #ef7d00;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 0;
        background:
          radial-gradient(circle at 10% 0%, var(--body-glow-1), transparent 40%),
          radial-gradient(circle at 100% 0%, var(--body-glow-2), transparent 36%),
          linear-gradient(180deg, var(--body-top) 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "LXGW WenKai Mono", "PingFang SC", "Noto Sans CJK SC",
          "Noto Sans SC", "Source Han Sans SC", -apple-system,
          BlinkMacSystemFont, "Segoe UI", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }
      #news-card {
        width: 1200px;
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 24px 70px var(--card-shadow);
      }
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        padding: 0 40px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(92deg, var(--hero-bg-1) 0%, var(--hero-bg-2) 45%, var(--hero-bg-3) 100%);
      }
      .hero-main {
        min-width: 0;
        text-align: center;
      }
      .brand {
        margin: 0;
        letter-spacing: 0.02em;
        font-size: 70px;
        font-weight: 800;
        line-height: 1.05;
      }
      .brand-accent {
        color: var(--accent);
      }
      .hero-meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: var(--hero-meta-size);
        font-weight: var(--hero-meta-weight);
      }
      .content {
        padding: 8px 34px 10px;
      }
      ol {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: brief-item;
        font-size: var(--news-font-size);
        line-height: 1.45;
        font-weight: 700;
      }
      li {
        counter-increment: brief-item;
        position: relative;
        margin: 0;
        padding: 11px 18px 11px 85px;
        border: 1px solid var(--news-border);
        background: linear-gradient(180deg, var(--news-surface-top) 0%, var(--news-surface-bottom) 100%);
        border-radius: 14px;
      }
      li::before {
        content: counter(brief-item, decimal-leading-zero);
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        min-width: 47px;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--badge-bg);
        color: var(--badge-text);
        font-size: 23px;
        font-weight: 800;
        line-height: 1.4;
        text-align: center;
      }
      li + li {
        margin-top: var(--news-item-gap);
      }
      .quote-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 56px 0;
        height: 128px;
        margin-bottom: 8px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, var(--quote-bg-top) 0%, var(--quote-bg-bottom) 100%);
      }
      .quote-shell {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .quote-mark {
        position: absolute;
        top: 50%;
        transform: translateY(-50%) skewX(-12deg);
        color: var(--quote-mark);
        font-size: 58px;
        font-weight: 800;
        line-height: 1;
      }
      .quote-mark-left {
        left: 58px;
      }
      .quote-mark-right {
        right: 58px;
      }
      .quote-text {
        margin: 0;
        max-width: 76%;
        color: var(--quote-text-color);
        text-align: center;
        font-size: 29px;
        font-weight: 700;
        line-height: 1.45;
        font-style: italic;
      }
      .footer {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "left-top right-top"
          "left-bottom right-bottom";
        align-items: center;
        align-content: start;
        column-gap: 16px;
        row-gap: 6px;
        padding: 10px 34px var(--footer-edge-gap);
        border-top: 1px solid var(--line);
        color: var(--muted);
        background: var(--footer-bg);
      }
      .footer-text {
        color: var(--muted);
        font-size: var(--footer-font-size);
        font-weight: var(--footer-font-weight);
        line-height: var(--footer-line-height);
      }
      .footer-text-strong {
        color: var(--muted-strong);
      }
      .footer-left,
      .footer-right {
        min-width: 0;
      }
      .footer-left {
        display: contents;
      }
      .footer-sources {
        grid-area: left-top;
        padding-left: 12px;
        border-left: 4px solid var(--footer-accent-bar);
      }
      .footer-meta {
        grid-area: left-bottom;
        display: inline-flex;
        flex-wrap: wrap;
        gap: 0;
        padding-left: 12px;
        border-left: 4px solid var(--footer-accent-bar);
      }
      .footer-right {
        display: contents;
      }
      .footer-right-top {
        grid-area: right-top;
        justify-self: end;
        text-align: right;
      }
      .footer-right-bottom {
        grid-area: right-bottom;
        justify-self: end;
        text-align: right;
      }
      @media (max-width: 640px) {
        body {
          padding: 0;
        }
        .hero {
          padding: 22px 18px 18px;
          gap: 12px;
        }
        .content {
          padding: 18px 16px 14px;
        }
        .footer {
          padding: 12px 16px 16px;
          grid-template-columns: 1fr;
          grid-template-areas:
            "left-top"
            "left-bottom"
            "right-top"
            "right-bottom";
          gap: 8px;
        }
        .brand {
          font-size: 28px;
        }
        .hero-meta,
        .quote-text {
          font-size: 18px;
        }
        ol {
          font-size: 18px;
        }
        li {
          padding: 10px 10px 10px 52px;
        }
        li::before {
          left: 10px;
          min-width: 28px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body data-theme="{{ theme_name }}">
    {% block body %}{% endblock %}
  </body>
</html>
