<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}每日简报{% endblock %}</title>
    <style>
      {{ font_face_css | safe }}
      :root {
        color-scheme: light;
        --bg: #eef2f7;
        --card: #ffffff;
        --text: #0f172a;
        --news-text: #0b1220;
        --muted: #475569;
        --muted-strong: #1e293b;
        --accent: #0ea5e9;
        --line: #dbe4f0;
        --body-glow-1: rgba(14, 165, 233, 0.12);
        --body-glow-2: rgba(59, 130, 246, 0.1);
        --body-top: #f8fbff;
        --card-border: #d7e3f3;
        --card-shadow: rgba(15, 23, 42, 0.12);
        --hero-bg-1: #f8fcff;
        --hero-bg-2: #f2f7ff;
        --hero-bg-3: #eef4ff;
        --news-border: #dce8f8;
        --news-surface-top: #ffffff;
        --news-surface-bottom: #f8fbff;
        --badge-bg: #e0f2fe;
        --badge-text: #0369a1;
        --quote-bg-top: #f8fbff;
        --quote-bg-bottom: #f3f8ff;
        --quote-mark: #0f766e;
        --quote-text-color: #334155;
        --footer-bg: #f8fbff;
        --footer-accent-bar: #7dd3fc;
        --hero-meta-size: 34px;
        --hero-meta-weight: 800;
        --news-font-size: 38px;
        --news-item-gap: 10px;
        --footer-font-size: 22px;
        --footer-font-weight: 800;
        --footer-line-height: 1.25;
        --footer-edge-gap: 12px;
      }
      body[data-theme="warm"] {
        --bg: #f5f1e8;
        --card: #fffdf8;
        --text: #302822;
        --news-text: #241c16;
        --muted: #7f756b;
        --muted-strong: #62584e;
        --accent: #ef7d00;
        --line: rgba(48, 40, 34, 0.1);
        --body-glow-1: rgba(239, 125, 0, 0.08);
        --body-glow-2: rgba(239, 125, 0, 0);
        --body-top: #fcfaf5;
        --card-border: rgba(48, 40, 34, 0.1);
        --card-shadow: rgba(48, 40, 34, 0.1);
        --hero-bg-1: #f9f4eb;
        --hero-bg-2: #f9f4eb;
        --hero-bg-3: #f9f4eb;
        --news-border: rgba(48, 40, 34, 0.12);
        --news-surface-top: #fffdf8;
        --news-surface-bottom: #fcf8f1;
        --badge-bg: #ffe7cc;
        --badge-text: #b45309;
        --quote-bg-top: #f9f4eb;
        --quote-bg-bottom: #f9f4eb;
        --quote-mark: #b45309;
        --quote-text-color: #62584e;
        --footer-bg: #fffaf2;
        --footer-accent-bar: #ef7d00;
      }
      body[data-theme="forest"] {
        --bg: #edf4ef;
        --card: #fbfdfb;
        --text: #1f3328;
        --news-text: #16261d;
        --muted: #5d7468;
        --muted-strong: #32473b;
        --accent: #2f855a;
        --line: #d7e6dc;
        --body-glow-1: rgba(47, 133, 90, 0.12);
        --body-glow-2: rgba(101, 163, 127, 0.1);
        --body-top: #f7fbf8;
        --card-border: #d7e6dc;
        --card-shadow: rgba(31, 51, 40, 0.12);
        --hero-bg-1: #f2f8f3;
        --hero-bg-2: #ecf5ee;
        --hero-bg-3: #e5f1e8;
        --news-border: #d8e7dc;
        --news-surface-top: #ffffff;
        --news-surface-bottom: #f8fcf9;
        --badge-bg: #dff3e7;
        --badge-text: #1f6b45;
        --quote-bg-top: #f5faf6;
        --quote-bg-bottom: #edf6f0;
        --quote-mark: #2f855a;
        --quote-text-color: #355244;
        --footer-bg: #f5faf6;
        --footer-accent-bar: #68b984;
      }
      body[data-theme="navy"] {
        --bg: #eef2f8;
        --card: #fbfcfe;
        --text: #16233a;
        --news-text: #0f1b2e;
        --muted: #5a6880;
        --muted-strong: #23344f;
        --accent: #2b4c7e;
        --line: #d8e0ec;
        --body-glow-1: rgba(43, 76, 126, 0.12);
        --body-glow-2: rgba(69, 102, 150, 0.1);
        --body-top: #f7f9fc;
        --card-border: #d8e0ec;
        --card-shadow: rgba(22, 35, 58, 0.14);
        --hero-bg-1: #f3f6fb;
        --hero-bg-2: #edf2f8;
        --hero-bg-3: #e7edf5;
        --news-border: #d8e2f0;
        --news-surface-top: #ffffff;
        --news-surface-bottom: #f8fafd;
        --badge-bg: #dbe7fb;
        --badge-text: #2b4c7e;
        --quote-bg-top: #f5f8fc;
        --quote-bg-bottom: #eef3f9;
        --quote-mark: #335c95;
        --quote-text-color: #314564;
        --footer-bg: #f5f8fc;
        --footer-accent-bar: #7aa2d6;
      }
      body[data-theme="terracotta"] {
        --bg: #f7efe9;
        --card: #fffaf6;
        --text: #3b2a22;
        --news-text: #241611;
        --muted: #7b655a;
        --muted-strong: #5e463b;
        --accent: #c96b4b;
        --line: #ead8cf;
        --body-glow-1: rgba(201, 107, 75, 0.12);
        --body-glow-2: rgba(227, 155, 127, 0.09);
        --body-top: #fdf8f4;
        --card-border: #ead8cf;
        --card-shadow: rgba(59, 42, 34, 0.12);
        --hero-bg-1: #fdf5ef;
        --hero-bg-2: #f8eee7;
        --hero-bg-3: #f4e6de;
        --news-border: #ecd9cf;
        --news-surface-top: #fffdfb;
        --news-surface-bottom: #fcf5f0;
        --badge-bg: #ffe1d6;
        --badge-text: #b45436;
        --quote-bg-top: #fcf3ee;
        --quote-bg-bottom: #f7ebe4;
        --quote-mark: #c96b4b;
        --quote-text-color: #64493d;
        --footer-bg: #fdf6f1;
        --footer-accent-bar: #de8a6e;
      }
      body[data-theme="rose"] {
        --bg: #f7f0f1;
        --card: #fffafb;
        --text: #35272d;
        --news-text: #23161c;
        --muted: #7d6770;
        --muted-strong: #5f4852;
        --accent: #c06c84;
        --line: #ebdbe0;
        --body-glow-1: rgba(192, 108, 132, 0.12);
        --body-glow-2: rgba(218, 158, 176, 0.08);
        --body-top: #fdf8fa;
        --card-border: #ebdbe0;
        --card-shadow: rgba(53, 39, 45, 0.12);
        --hero-bg-1: #fcf5f7;
        --hero-bg-2: #f7eef1;
        --hero-bg-3: #f2e6eb;
        --news-border: #eddde3;
        --news-surface-top: #fffdfd;
        --news-surface-bottom: #fcf6f8;
        --badge-bg: #f9dfe7;
        --badge-text: #a75470;
        --quote-bg-top: #fcf5f7;
        --quote-bg-bottom: #f6ecef;
        --quote-mark: #c06c84;
        --quote-text-color: #664e58;
        --footer-bg: #fdf6f8;
        --footer-accent-bar: #d89aae;
      }
      body[data-theme="citrus"] {
        --bg: #f8f6e8;
        --card: #fffdf7;
        --text: #37311f;
        --news-text: #2a2414;
        --muted: #7e7558;
        --muted-strong: #5e563b;
        --accent: #c79a1b;
        --line: #ebe3bf;
        --body-glow-1: rgba(199, 154, 27, 0.12);
        --body-glow-2: rgba(187, 206, 116, 0.09);
        --body-top: #fdfcf4;
        --card-border: #ebe3bf;
        --card-shadow: rgba(55, 49, 31, 0.12);
        --hero-bg-1: #fcfbef;
        --hero-bg-2: #f7f4e3;
        --hero-bg-3: #f2eed5;
        --news-border: #ece4c4;
        --news-surface-top: #fffefb;
        --news-surface-bottom: #fcfaef;
        --badge-bg: #f8edb8;
        --badge-text: #9d7511;
        --quote-bg-top: #fcfaee;
        --quote-bg-bottom: #f6f2dc;
        --quote-mark: #b58816;
        --quote-text-color: #62593b;
        --footer-bg: #fcfaee;
        --footer-accent-bar: #d7b547;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 0;
        background:
          radial-gradient(circle at 10% 0%, var(--body-glow-1), transparent 40%),
          radial-gradient(circle at 100% 0%, var(--body-glow-2), transparent 36%),
          linear-gradient(180deg, var(--body-top) 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "LXGW WenKai Mono", "PingFang SC", "Noto Sans CJK SC",
          "Noto Sans SC", "Source Han Sans SC", -apple-system,
          BlinkMacSystemFont, "Segoe UI", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }
      #news-card {
        width: 1200px;
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 30px 90px var(--card-shadow);
      }
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        padding: 22px 42px 20px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(92deg, var(--hero-bg-1) 0%, var(--hero-bg-2) 45%, var(--hero-bg-3) 100%);
      }
      .hero-main {
        min-width: 0;
        text-align: center;
      }
      .brand {
        margin: 0;
        letter-spacing: 0.015em;
        font-size: 76px;
        font-weight: 800;
        line-height: 1;
      }
      .brand-accent {
        color: var(--accent);
      }
      .hero-meta {
        margin-top: 8px;
        color: var(--muted-strong);
        font-size: var(--hero-meta-size);
        font-weight: var(--hero-meta-weight);
        line-height: 1.18;
      }
      .hero-meta-separator {
        color: var(--accent);
      }
      .content {
        padding: 18px 30px 12px;
      }
      ol {
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: brief-item;
        font-size: var(--news-font-size);
        line-height: 1.36;
        font-weight: 700;
      }
      li {
        counter-increment: brief-item;
        position: relative;
        margin: 0;
        padding: 16px 20px 16px 98px;
        border: 1px solid var(--news-border);
        background: linear-gradient(180deg, var(--news-surface-top) 0%, var(--news-surface-bottom) 100%);
        border-radius: 18px;
        color: var(--news-text);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }
      li::before {
        content: counter(brief-item, decimal-leading-zero);
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        min-width: 56px;
        padding: 4px 12px;
        border-radius: 999px;
        background: var(--badge-bg);
        color: var(--badge-text);
        font-size: 26px;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
      }
      li + li {
        margin-top: var(--news-item-gap);
      }
      .quote-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 104px;
        padding: 14px 42px 16px;
        margin-bottom: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, var(--quote-bg-top) 0%, var(--quote-bg-bottom) 100%);
      }
      .quote-shell {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .quote-mark {
        position: absolute;
        top: 50%;
        transform: translateY(-50%) skewX(-12deg);
        color: var(--quote-mark);
        font-size: 52px;
        font-weight: 800;
        line-height: 1;
      }
      .quote-mark-left {
        left: 26px;
      }
      .quote-mark-right {
        right: 26px;
      }
      .quote-text {
        margin: 0;
        max-width: 84%;
        color: var(--quote-text-color);
        text-align: center;
        font-size: 34px;
        font-weight: 700;
        line-height: 1.35;
        font-style: italic;
      }
      .footer {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "left-top right-top"
          "left-bottom right-bottom";
        align-items: center;
        align-content: start;
        column-gap: 18px;
        row-gap: 4px;
        padding: 12px 30px var(--footer-edge-gap);
        border-top: 1px solid var(--line);
        color: var(--muted);
        background: var(--footer-bg);
      }
      .footer-text {
        color: var(--muted);
        font-size: var(--footer-font-size);
        font-weight: var(--footer-font-weight);
        line-height: var(--footer-line-height);
      }
      .footer-text-strong {
        color: var(--muted-strong);
      }
      .footer-left,
      .footer-right {
        min-width: 0;
      }
      .footer-left {
        display: contents;
      }
      .footer-sources {
        grid-area: left-top;
        padding-left: 14px;
        border-left: 4px solid var(--footer-accent-bar);
      }
      .footer-meta {
        grid-area: left-bottom;
        display: inline-flex;
        flex-wrap: wrap;
        gap: 14px;
        padding-left: 14px;
        border-left: 4px solid var(--footer-accent-bar);
      }
      .footer-right {
        display: contents;
      }
      .footer-right-top {
        grid-area: right-top;
        justify-self: end;
        text-align: right;
      }
      .footer-right-bottom {
        grid-area: right-bottom;
        justify-self: end;
        text-align: right;
      }
      @media (max-width: 640px) {
        body {
          padding: 0;
        }
        .hero {
          padding: 22px 18px 18px;
          gap: 12px;
        }
        .content {
          padding: 18px 16px 14px;
        }
        .footer {
          padding: 12px 16px 16px;
          grid-template-columns: 1fr;
          grid-template-areas:
            "left-top"
            "left-bottom"
            "right-top"
            "right-bottom";
          gap: 8px;
        }
        .brand {
          font-size: 28px;
        }
        .hero-meta,
        .quote-text {
          font-size: 18px;
        }
        ol {
          font-size: 18px;
        }
        li {
          padding: 10px 10px 10px 52px;
        }
        li::before {
          left: 10px;
          min-width: 28px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body data-theme="{{ theme_name }}">
    {% block body %}{% endblock %}
  </body>
</html>
